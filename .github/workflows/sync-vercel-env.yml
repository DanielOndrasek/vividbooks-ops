# Ruční synchronizace: GitHub Repository secrets → Vercel Environment Variables (apps/web).
# Po prvním spuštění zkontroluj deploy na Vercelu (Git push nebo Redeploy).

name: Sync secrets to Vercel

on:
  workflow_dispatch:

concurrency:
  group: sync-vercel-env
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync env to Vercel project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          ALLOWED_EMAIL_DOMAIN: ${{ secrets.ALLOWED_EMAIL_DOMAIN }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_FILTER_LABEL: ${{ secrets.GMAIL_FILTER_LABEL }}
          GMAIL_PROCESSED_LABEL: ${{ secrets.GMAIL_PROCESSED_LABEL }}
          GMAIL_POLL_MAX_RESULTS: ${{ secrets.GMAIL_POLL_MAX_RESULTS }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          INVOICE_TMP_DIR: ${{ secrets.INVOICE_TMP_DIR }}
          GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_INVOICES_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_INVOICES_FOLDER_ID }}
          GOOGLE_DRIVE_RECEIPTS_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_RECEIPTS_FOLDER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          AI_CONFIDENCE_THRESHOLD: ${{ secrets.AI_CONFIDENCE_THRESHOLD }}
          AI_BATCH_LIMIT: ${{ secrets.AI_BATCH_LIMIT }}
        run: bash .github/scripts/sync-vercel-env.sh
